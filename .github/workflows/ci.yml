name: Flint CI & Release

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ] 
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Target Dependencies (Clang, libcurl & tcc)
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libcurl4-openssl-dev tcc libtcc-dev 
    
    - name: Cache Zig
      uses: actions/cache@v4
      with:
        path: /opt/zig
        key: zig-0.15.2

    - name: Install Zig
      run: |
        if [ ! -f /opt/zig/zig ]; then
          wget -q https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
          tar -xf zig-x86_64-linux-0.15.2.tar.xz
          sudo mv zig-x86_64-linux-0.15.2 /opt/zig
        fi
        echo "/opt/zig" >> $GITHUB_PATH

    - name: Verify Zig
      run: zig version

    - name: Build Flint
      run: zig build -Doptimize=ReleaseFast 

    - name: Run Test Battery
      run: ./zig-out/bin/flint test

    - name: Package Release Tarball
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        # Cria a estrutura do pacote
        mkdir -p flint-package/bin
        mkdir -p flint-package/std
        
        # Copia o binário e a Standard Library
        cp ./zig-out/bin/flint flint-package/bin/
        cp -r ./std/* flint-package/std/
        
        # Zipa tudo no formato que o install.sh espera
        tar -czvf flint-linux-x86_64.tar.gz -C flint-package .

    - name: Upload to GitHub Releases
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: flint-linux-x86_64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}