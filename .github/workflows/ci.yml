name: Flint CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:ltw1ltw1ltw1
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Target Dependencies (Clang & libcurl)
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libcurl4-openssl-dev
    
    - name: Install Zig
      run: |
        wget https://ziglang.org/download/0.15.2/zig-linux-x86_64-0.15.2.tar.xz
        tar -xf zig-linux-x86_64-0.15.2.tar.xz
        sudo mv zig-linux-x86_64-0.15.2 /opt/zig
        echo "/opt/zig" >> $GITHUB_PATH
        zig version

    - name: Build Flint
      run: zig build -Doptimize=ReleaseFast

    - name: Run Test Battery
      run: ./zig-out/bin/flint test