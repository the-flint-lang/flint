name: Flint CI & Release

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ] 
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Target Dependencies (Cross-Compilation Setup)
      run: |
        # 1. Informa ao APT que os repositórios padrões são apenas para amd64
        sudo sed -i 's/^deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
        sudo sed -i 's/^deb mirror/deb [arch=amd64] mirror/g' /etc/apt/sources.list
        
        # 2. Adiciona os repositórios ARM64 específicos do Ubuntu 22.04 (Jammy)
        cat <<EOF | sudo tee /etc/apt/sources.list.d/arm64.list
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main universe restricted multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main universe restricted multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main universe restricted multiverse
        EOF
        
        # 3. Adiciona a arquitetura e atualiza o cache
        sudo dpkg --add-architecture arm64
        sudo apt-get update
        
        # 4. Instala as ferramentas base e a libcurl para amd64 pacificamente
        sudo apt-get install -y clang tcc libtcc-dev gcc-aarch64-linux-gnu libc6-dev-arm64-cross libcurl4-openssl-dev
        
        # 5. A Marretada: Força a instalação das bibliotecas arm64 ignorando os conflitos de arquivos compartilhados
        sudo apt-get install -y -o Dpkg::Options::="--force-overwrite" libcurl4-openssl-dev:arm64 libtcc-dev:arm64
    
    - name: Cache Zig
      uses: actions/cache@v4
      with:
        path: /opt/zig
        key: zig-0.15.2

    - name: Install Zig
      run: |
        if [ ! -f /opt/zig/zig ]; then
          wget -q https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
          tar -xf zig-x86_64-linux-0.15.2.tar.xz
          sudo mv zig-x86_64-linux-0.15.2 /opt/zig
        fi
        echo "/opt/zig" >> $GITHUB_PATH

    - name: Verify Zig
      run: zig version

    - name: Build Flint (x86_64)
      run: zig build -Dtarget=x86_64-linux-gnu.2.31 -Doptimize=ReleaseSmall -Dcpu=baseline --prefix out-x86_64

    - name: Mock System Installation
      run: |
        sudo mkdir -p /usr/share/flint/std
        sudo cp src/core/codegen/runtime/flint_rt.* /usr/share/flint/
        sudo cp -r std/* /usr/share/flint/std/

    - name: Build Flint (aarch64)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        sed -i 's/x86_64-linux-gnu/aarch64-linux-gnu/g' build.zig
        
        zig build -Dtarget=aarch64-linux-gnu.2.31 -Doptimize=ReleaseSmall -Dcpu=baseline --prefix out-aarch64

    - name: Package Release Tarballs
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        mkdir -p pkg-x86_64/bin pkg-x86_64/std
        cp ./out-x86_64/bin/flint pkg-x86_64/bin/
        cp -r ./std/* pkg-x86_64/std/
        cp src/core/codegen/runtime/flint_rt.* pkg-x86_64/
        tar -czvf flint-linux-x86_64.tar.gz -C pkg-x86_64 .

        mkdir -p pkg-aarch64/bin pkg-aarch64/std
        cp ./out-aarch64/bin/flint pkg-aarch64/bin/
        cp -r ./std/* pkg-aarch64/std/
        cp src/core/codegen/runtime/flint_rt.* pkg-aarch64/
        tar -czvf flint-linux-aarch64.tar.gz -C pkg-aarch64 .

    - name: Build Debian Packages (.deb)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        
        mkdir -p deb-amd64/usr/bin deb-amd64/usr/share/flint/std deb-amd64/DEBIAN
        
        cp ./out-x86_64/bin/flint deb-amd64/usr/bin/
        cp -r ./std/* deb-amd64/usr/share/flint/std/
        
        cp src/core/codegen/runtime/flint_rt.c deb-amd64/usr/share/flint/
        cp src/core/codegen/runtime/flint_rt.h deb-amd64/usr/share/flint/
        clang -O3 -ffunction-sections -fdata-sections -fvisibility=hidden -fno-semantic-interposition \
          -c src/core/codegen/runtime/flint_rt.c -o deb-amd64/usr/share/flint/flint_rt.o
        clang -O3 -x c-header src/core/codegen/runtime/flint_rt.h -o deb-amd64/usr/share/flint/flint_rt.h.pch
        
        cat << EOF > deb-amd64/DEBIAN/control
        Package: flint
        Version: ${VERSION}
        Section: devel
        Priority: optional
        Architecture: amd64
        Depends: libc6-dev, libtcc-dev, libcurl4-openssl-dev, clang | gcc, tcc
        Maintainer: Lucas Paulino Da Silva <lucas.workps@gmail.com>
        Description: Pipeline-oriented systems programming language
         Flint is a statically-typed, pipeline-oriented language that transpiles to C99.
         Designed as a fast, dependency-free replacement for Bash and Python.
        EOF
        dpkg-deb --build deb-amd64 "flint_${VERSION}_amd64.deb"

        mkdir -p deb-arm64/usr/bin deb-arm64/usr/share/flint/std deb-arm64/DEBIAN
        
        # Binário e STD
        cp ./out-aarch64/bin/flint deb-arm64/usr/bin/
        cp -r ./std/* deb-arm64/usr/share/flint/std/
        
        cp src/core/codegen/runtime/flint_rt.c deb-arm64/usr/share/flint/
        cp src/core/codegen/runtime/flint_rt.h deb-arm64/usr/share/flint/
        clang --target=aarch64-linux-gnu -O3 -ffunction-sections -fdata-sections -fvisibility=hidden -fno-semantic-interposition \
          -c src/core/codegen/runtime/flint_rt.c -o deb-arm64/usr/share/flint/flint_rt.o
        clang --target=aarch64-linux-gnu -O3 -x c-header src/core/codegen/runtime/flint_rt.h -o deb-arm64/usr/share/flint/flint_rt.h.pch
        
        cat << EOF > deb-arm64/DEBIAN/control
        Package: flint
        Version: ${VERSION}
        Section: devel
        Priority: optional
        Architecture: arm64
        Depends: libc6-dev, libtcc-dev, libcurl4-openssl-dev, clang | gcc, tcc
        Maintainer: Lucas Paulino Da Silva <lucas.workps@gmail.com>
        Description: Pipeline-oriented systems programming language
         Flint is a statically-typed, pipeline-oriented language that transpiles to C99.
         Designed as a fast, dependency-free replacement for Bash and Python.
        EOF
        dpkg-deb --build deb-arm64 "flint_${VERSION}_arm64.deb"

    - name: Upload to GitHub Releases
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          flint-linux-x86_64.tar.gz
          flint-linux-aarch64.tar.gz
          flint_*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to APT Repository (gh-pages)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        sudo apt-get install -y dpkg-dev
        
        git clone --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git apt-repo
        
        mkdir -p apt-repo/pool/main/
        cp flint_*.deb apt-repo/pool/main/
        
        cd apt-repo
        dpkg-scanpackages --multiversion pool/ > Packages
        gzip -k -f Packages
        
        git add pool/ Packages Packages.gz
        git commit -m "chore: release APT packages for ${GITHUB_REF_NAME#v}" || echo "Nenhuma alteração para commitar"
        git push origin gh-pages